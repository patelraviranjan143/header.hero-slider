<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Hero Slider</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css"/>

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>

  <!-- HEADER -->
  <header class="header">

    <div class="logo">Brand.</div>

    <nav class="navbar" id="navbar">
      <a href="#"> Home </a>
      <a href="#"> About </a>
      <a href="#"> Services </a>
      <a href="#"> Portfolio </a>
      <a href="#"> Contact </a>
    </nav>

    <div class="menu-btn" id="menu-btn">
      <i class="fas fa-bars"></i>
    </div>

  </header>

  <!-- HERO SLIDER -->
  <section class="hero-slider">

    <!-- Slide 1 -->
    <div class="slide active">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" alt="slide1">

      <div class="content">
        <h1>Creative Digital Agency</h1>
        <p>
          Build modern responsive websites with clean UI/UX.
        </p>
        <button>Explore More</button>
      </div>
    </div>

    <!-- Slide 2 -->
    <div class="slide">
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f" alt="slide2">

      <div class="content">
        <h1>Innovative Web Solutions</h1>
        <p>
          We create beautiful modern websites for businesses.
        </p>
        <button>Get Started</button>
      </div>
    </div>

    <!-- Slide 3 -->
    <div class="slide">
      <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3" alt="slide3">

      <div class="content">
        <h1>Responsive Modern Design</h1>
        <p>
          Optimized for desktop, tablet, and mobile devices.
        </p>
        <button>Learn More</button>
      </div>
    </div>

    <!-- PREV/NEXT BUTTONS -->
    <div class="prev">&#10094;</div>
    <div class="next">&#10095;</div>

  </section>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
